name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # можна запускати вручну з вкладки Actions

# Дозволи, потрібні для деплою на Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Лише один деплой за раз
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integral-trainer # застосунок у підпапці
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: integral-trainer/package-lock.json

      # npm install (а не ci): lock-файл згенеровано на Windows і не містить
      # linux-only optional-залежностей (@emnapi/*), через що `npm ci` падає.
      - run: npm install --no-audit --no-fund

      - name: Build static export
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: integral-trainer/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
